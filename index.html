<!DOCTYPE html>
<head>
  <title></title>
  <link rel="stylesheet" type="text/css" href="/styles.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
  />
  <link
    href="https://fonts.googleapis.com/css?family=Alegreya+Sans+SC:800|Indie+Flower|Lobster|Oleo+Script:700"
    rel="stylesheet"
  />
  <link
    href="https://fonts.googleapis.com/css?family=Monoton"
    rel="stylesheet"
  />
  <script>
    function isMobile() {
      if (navigator.userAgent.match(/Mobi/)) {
        return true;
      }

      if ("screen" in window && window.screen.width < 1366) {
        return true;
      }

      var connection =
        navigator.connection ||
        navigator.mozConnection ||
        navigator.webkitConnection;
      if (connection && connection.type === "cellular") {
        return true;
      }

      return false;
    }

    (function() {
      var hero = document.getElementById("hero");
      var mobile = isMobile();
      if (mobile) {
        hero.innerHTML = '<img src="hero-image.jpg" alt="">';
      } else {
        hero.innerHTML =
          '<video src="hero-image.mp4" poster="hero-image.jpg" autoplay loop muted playsinline>';
      }
    })();
  </script>
</head>

<main id="container"></main>
<div id="not-desktop">
  <div id="mobileMessageContent">
    <p id="coming soon">Coming soon for mobile!</p>
    <p id="someday">(someday)</p>
    <p id="never">never</p>
    <p>For now, please enjoy this site from your desktop</p>
    <p>
      Cheers,<br />
      Wilfredo
    </p>
  </div>
  <img
    id="mobileGif"
    src="https://media.giphy.com/media/U3qYN8S0j3bpK/giphy.gif"
    alt=""
  />
</div>

<script src="/bundle.js"></script>
<script>
  if (!isMobile()) {
    document.getElementById("not-desktop").style.display = "none";

    document.getElementById("container").style.display = "unset";
  } else {
    document.getElementById("not-desktop").style.display = "unset";
    document.getElementById("container").style.display = "none";
  }
</script>
